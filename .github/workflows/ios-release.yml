name: iOS Release

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx jest --bail
      - run: npx eslint .

  build-and-submit:
    needs: test
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Bump build number
        run: |
          BUILD_NUM="$(date +%Y%m%d).${{ github.run_number }}"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json'));
            app.expo.ios.buildNumber = '$BUILD_NUM';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "BUILD_NUMBER=$BUILD_NUM" >> $GITHUB_ENV

      - name: Prebuild
        run: LANG=en_US.UTF-8 npx expo prebuild --platform ios --clean

      - name: Patch Swift compatibility
        run: |
          FILE="node_modules/expo-apple-authentication/ios/AppleAuthenticationUtils.swift"
          if [ -f "$FILE" ]; then
            sed -i '' '/^        }$/!b; /^        @unknown default/!{ /^        default/!{ s/^        }$/        @unknown default:\n            break\n        }/; }' "$FILE" || true
          fi

      - name: Pod install
        run: cd ios && pod install

      - name: Install signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$CERTIFICATE_P12" | base64 -d > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/dtrain.mobileprovision

      - name: Build archive
        run: |
          xcodebuild \
            -workspace ios/DTrain.xcworkspace -scheme DTrain \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath build/DTrain.xcarchive \
            DEVELOPMENT_TEAM=J52KM8A8YH -allowProvisioningUpdates archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/DTrain.xcarchive \
            -exportPath build/AppStore \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            -f build/AppStore/DTrain.ipa -t ios \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}

      - name: Summary
        run: |
          echo "### iOS Release" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ env.BUILD_NUMBER }}" >> $GITHUB_STEP_SUMMARY
          echo "- Uploaded to App Store Connect" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
